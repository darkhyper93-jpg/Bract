name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ============================================================
  # CI check antes del deploy
  # ============================================================
  ci:
    name: Verify before deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @bract/shared build

      - name: Typecheck API
        run: pnpm --filter @bract/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @bract/web typecheck

  # ============================================================
  # Trigger deploy en Render via API
  # ============================================================
  deploy:
    name: Render deploy
    runs-on: ubuntu-latest
    needs: ci
    # Solo deployar si el CI pasó
    if: success()
    # Hoisteamos los secrets a env para poder chequear su presencia en los `if`.
    env:
      RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      # Render auto-deploya al detectar push a main via webhook configurado en el dashboard.
      # Este step solo es necesario si se usa un Deploy Hook explícito (RENDER_DEPLOY_HOOK_BACKEND).
      - name: Trigger backend deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_BACKEND != '' }}
        run: curl --fail -X POST "$RENDER_DEPLOY_HOOK_BACKEND"

      - name: Skip deploy hook (no configurado)
        if: ${{ env.RENDER_DEPLOY_HOOK_BACKEND == '' }}
        run: echo "RENDER_DEPLOY_HOOK_BACKEND no configurado — Render auto-deploya desde el dashboard al detectar el push."

      # DECISIÓN: slack-github-action@v2 espera webhook + webhook-type como inputs (no env como v1).
      # Se saltea si SLACK_WEBHOOK_URL no está, y continue-on-error para que nunca bloquee el deploy.
      - name: Notify on success
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Deploy en curso — *${{ github.repository }}* (`${{ github.sha }}`). Verificar en Render dashboard."
            }

      - name: Notify on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Deploy fallido — *${{ github.repository }}* (`${{ github.sha }}`). Revisar GitHub Actions."
            }
